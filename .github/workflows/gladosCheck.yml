name: auto check

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths-ignore:
      - 'README.md'
      - 'imgs/**'
  schedule:
    - cron: '0 4,10 * * *'  # UTC; Beijing 12:00 and 18:00

jobs:
  build:
    name: glados/railgun checkin
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    strategy:
      matrix:
        python-version: [3.13]

    # Force third-party JavaScript actions to use the Node.js 24 runtime.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    # Install Python dependencies.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pypushdeer

    # Fail fast instead of silently succeeding when GLADOS_COOKIES is missing.
    - name: Validate required secrets
      run: |
        if [ -z "$GLADOS_COOKIES" ]; then
          echo "::error::GLADOS_COOKIES repository secret is required."
          exit 1
        fi
      env:
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}

    # Run check-in script.
    - name: Running checkin
      run: |
        python checkin.py
      env:
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN || 'plan500' }}
        GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE || 'false' }}

    - name: Keep alive
      uses: liskin/gh-workflow-keepalive@v1

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 7
        delete_run_by_conclusion_pattern: success
